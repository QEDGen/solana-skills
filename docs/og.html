<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QEDGen OG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap">
<style>
@font-face {
  font-family: 'Geist';
  src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-Regular.woff2') format('woff2');
  font-weight: 400; font-display: block;
}
@font-face {
  font-family: 'Geist';
  src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-Medium.woff2') format('woff2');
  font-weight: 500; font-display: block;
}
@font-face {
  font-family: 'Geist';
  src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-SemiBold.woff2') format('woff2');
  font-weight: 600; font-display: block;
}
@font-face {
  font-family: 'Geist';
  src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/Geist-Bold.woff2') format('woff2');
  font-weight: 700; font-display: block;
}
@font-face {
  font-family: 'Geist Mono';
  src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/GeistMono-Regular.woff2') format('woff2');
  font-weight: 400; font-display: block;
}
@font-face {
  font-family: 'Geist Mono';
  src: url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/GeistMono-Medium.woff2') format('woff2');
  font-weight: 500; font-display: block;
}

:root {
  --bg: #06070b;
  --bg-panel: #0a0c12;
  --fg: #eaecf2;
  --fg-dim: #959aa8;
  --fg-mute: #656a78;
  --line: #1a1d26;
  --line-strong: #262a36;
  --accent: #38bdf8;
  --mono: "Geist Mono", ui-monospace, monospace;
  --sans: "Geist", -apple-system, sans-serif;
  --serif: "Instrument Serif", Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  width: 1200px;
  height: 630px;
}

body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  position: relative;
}

.grid-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 72px 72px;
  mask-image: radial-gradient(ellipse 65% 55% at 30% 45%, #000, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 65% 55% at 30% 45%, #000, transparent 70%);
  opacity: 0.3;
}

.top {
  position: absolute;
  left: 72px;
  right: 72px;
  top: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 1;
}

.lockup {
  display: inline-flex;
  align-items: center;
  gap: 14px;
}

.lockup .wm {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 24px;
  letter-spacing: -0.02em;
}

.wm .gen { color: var(--fg-dim); font-weight: 400; }

.top-right {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--fg-dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.top-right::before {
  content: '';
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 25%, transparent);
}

.main {
  position: absolute;
  left: 72px;
  right: 72px;
  top: 130px;
  z-index: 1;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 15px;
  color: var(--fg-dim);
  padding: 7px 16px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  background: var(--bg-panel);
  letter-spacing: 0.04em;
  align-self: flex-start;
}

.eyebrow .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 25%, transparent);
}

h1 {
  font-size: 88px;
  line-height: 0.98;
  letter-spacing: -0.04em;
  font-weight: 600;
  margin-top: 22px;
  max-width: 16ch;
}

h1 .italic {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.01em;
}

.tomb {
  display: inline-block;
  width: 0.48em;
  height: 0.48em;
  background: var(--accent);
  vertical-align: 0.1em;
  margin-left: 0.08em;
}

.sub {
  margin-top: 22px;
  max-width: 38ch;
  font-size: 21px;
  color: var(--fg-dim);
  line-height: 1.45;
}

.sub code {
  font-family: var(--mono);
  font-size: 18px;
  color: var(--fg);
  background: #0c0e14;
  padding: 2px 8px;
  border: 1px solid var(--line);
  border-radius: 5px;
}

.strip {
  position: absolute;
  left: 72px;
  right: 72px;
  top: 528px;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding-top: 22px;
  border-top: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 14px;
  color: var(--fg-dim);
}

.strip-label {
  font-size: 12px;
  color: var(--fg-mute);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-right: 4px;
}

.agents {
  display: inline-flex;
  gap: 22px;
  align-items: center;
  flex-wrap: wrap;
}

.agent {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--fg);
}

.agent-glyph {
  width: 26px;
  height: 26px;
  border: 1px solid var(--line-strong);
  border-radius: 5px;
  display: grid;
  place-items: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--fg-dim);
}

.install {
  font-family: var(--mono);
  font-size: 14px;
  color: var(--fg-dim);
  padding: 10px 14px;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  background: var(--bg-panel);
}

.install .p { color: var(--fg-mute); margin-right: 8px; }
.install .cmd { color: var(--fg); }
</style>
</head>
<body>
  <div class="grid-bg"></div>

  <div class="top">
    <div class="lockup">
      <svg width="44" height="44" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="34" height="34" rx="4" stroke="#38bdf8" stroke-width="2.5"/>
        <path d="M12 21L18 27L30 15" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="28" y="28" width="6" height="6" fill="#38bdf8"/>
      </svg>
      <span class="wm"><span>QED</span><span class="gen">gen</span></span>
    </div>
    <div class="top-right">qedgen.dev</div>
  </div>

  <div class="main">
    <span class="eyebrow"><span class="dot"></span>proofs, not promises</span>
    <h1>Ship to mainnet <span class="italic">without</span> fear.<span class="tomb"></span></h1>
    <p class="sub">
      Describe what your Solana program must guarantee in <code>.qedspec</code>.
      QEDGen generates the proofs, property tests, and CI.
    </p>
  </div>

  <div class="strip">
    <div class="agents">
      <span class="strip-label">Runs with</span>
      <span class="agent"><span class="agent-glyph">CC</span>Claude Code</span>
      <span class="agent"><span class="agent-glyph">CX</span>Codex</span>
      <span class="agent"><span class="agent-glyph">→</span>Cursor</span>
      <span class="agent"><span class="agent-glyph">W</span>Windsurf</span>
    </div>
    <div class="install"><span class="p">$</span><span class="cmd">npx skills add qedgen/solana-skills</span></div>
  </div>
</body>
</html>
